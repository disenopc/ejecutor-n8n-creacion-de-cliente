<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --paper: #f5f2eb;
      --accent: #c8440a;
      --muted: #8a8778;
      --border: #d4d0c4;
      --success-bg: #e8f5e0;
      --success-text: #2d6a1f;
      --error-bg: #fdecea;
      --error-text: #b91c1c;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(200,68,10,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(26,26,24,0.04) 0%, transparent 50%);
    }

    .card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 3rem 3.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 6px 6px 0 var(--border);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--ink);
    }

    input::placeholder {
      color: var(--border);
    }

    .webhook-row {
      margin-bottom: 2rem;
    }

    .webhook-input-wrap {
      display: flex;
      gap: 0;
    }

    .webhook-input-wrap input {
      border-radius: 2px 0 0 2px;
      border-right: none;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .webhook-input-wrap input:focus {
      border-color: var(--ink);
      border-right: none;
    }

    .copy-btn {
      padding: 0 1rem;
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 0 2px 2px 0;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: var(--border); color: var(--ink); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 1rem;
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    button[type="submit"]:hover { background: #2e2e2b; }
    button[type="submit"]:active { transform: translateY(1px); }
    button[type="submit"]:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-text { display: block; }

    .result {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      border-radius: 2px;
      font-size: 0.8rem;
      line-height: 1.6;
      display: none;
      border-left: 3px solid;
    }

    .result.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: #4a9b2f;
    }

    .result.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #b91c1c;
    }

    .result-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.4rem;
    }

    .result-data { word-break: break-all; }

    .result-row { margin-bottom: 0.3rem; }
    .result-row:last-child { margin-bottom: 0; }
    .result-key { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">N8N · Automatización</p>
    <h1>Crear<br>cliente</h1>

    <div class="webhook-row">
      <label>URL del webhook</label>
      <div class="webhook-input-wrap">
        <input type="text" id="webhookUrl" placeholder="https://tu-instancia.n8n.cloud/webhook/..." />
        <button class="copy-btn" onclick="copyUrl()">Copiar</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Cliente</label>
      <input type="text" id="cliente" placeholder="Empresa ABC" autocomplete="off" />
    </div>

    <div class="field">
      <label>Año</label>
      <input type="text" id="anio" placeholder="2025" maxlength="4" autocomplete="off" />
    </div>

    <button type="submit" id="submitBtn" onclick="enviar()">
      <span class="btn-text">Crear cliente</span>
      <span class="spinner" id="spinner"></span>
    </button>

    <div class="result" id="result">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-data" id="resultData"></div>
    </div>
  </div>

  <script>
    function copyUrl() {
      const url = document.getElementById('webhookUrl').value;
      if (!url) return;
      navigator.clipboard.writeText(url);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copiado';
      setTimeout(() => btn.textContent = 'Copiar', 1500);
    }

    async function enviar() {
      const url = document.getElementById('webhookUrl').value.trim();
      const cliente = document.getElementById('cliente').value.trim();
      const anio = document.getElementById('anio').value.trim();
      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const btnText = btn.querySelector('.btn-text');
      const result = document.getElementById('result');

      if (!url) return showResult('error', 'Falta la URL del webhook');
      if (!cliente) return showResult('error', 'Ingresá el nombre del cliente');
      if (!anio || anio.length !== 4) return showResult('error', 'Ingresá un año válido (4 dígitos)');

      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      result.style.display = 'none';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cliente, anio })
        });

        const data = await res.json();
        const isNew = data.status === 'created';

        const rows = [
          { key: 'estado', val: isNew ? '✓ Cliente creado' : '→ Cliente ya existía' },
          { key: 'cliente', val: data.cliente || cliente },
          { key: 'folder_id', val: data.folder_id || '—' },
          { key: 'sheet_id', val: data.sheet_id || '—' },
        ];

        const html = rows.map(r =>
          `<div class="result-row"><span class="result-key">${r.key}: </span>${r.val}</div>`
        ).join('');

        showResult('success', html, isNew ? 'Respuesta del workflow' : 'Cliente existente');

      } catch (e) {
        showResult('error', 'No se pudo conectar con el webhook. Verificá la URL y que el workflow esté activo.');
      } finally {
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    }

    function showResult(type, html, label = '') {
      const result = document.getElementById('result');
      const resultLabel = document.getElementById('resultLabel');
      const resultData = document.getElementById('resultData');
      result.className = `result ${type}`;
      resultLabel.textContent = label || (type === 'error' ? 'Error' : '');
      resultData.innerHTML = html;
      result.style.display = 'block';
    }

    document.getElementById('anio').addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') enviar();
    });
  </script>
</body>
</html>
